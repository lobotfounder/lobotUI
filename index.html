<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOBOT | MOH Legal Pilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f8fafc; margin: 0; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MOHLogo = () => (
            <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="40" height="40" rx="8" fill="#003168"/>
                <path d="M20 10L11 14V20C11 25.55 14.84 30.74 20 32C25.16 30.74 29 25.55 29 20V14L20 10Z" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M17 21H23M20 18V24" stroke="white" strokeWidth="2" strokeLinecap="round"/>
            </svg>
        );

        function LobotAssistant() {
            const [isOpen, setIsOpen] = useState(false);
            const [input, setInput] = useState("");
            const [messages, setMessages] = useState([
                { role: 'bot', text: "Hello MOH user. How may I help you today with your legal queries?" }
            ]);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const handleSend = () => {
                if (!input.trim()) return;
                const newMessages = [...messages, { role: 'user', text: input }];
                setMessages(newMessages);
                setInput("");
                
                setTimeout(() => {
                    setMessages([...newMessages, { 
                        role: 'bot', 
                        text: "Based on the internal guidelines [Source: Section 4.2], the procedure remains unchanged. Would you like me to draft a summary for the client?" 
                    }]);
                }, 800);
            };

            const theme = {
                primary: '#003168',
                bg: '#ffffff',
                userBubble: '#f1f5f9',
                border: '#e2e8f0',
                text: '#0f172a',
                subtext: '#64748b'
            };

            return (
                <div style={{ position: 'fixed', bottom: '30px', right: '30px', zIndex: 10000 }}>
                    {isOpen && (
                        <div style={{
                            width: '420px', height: '640px', backgroundColor: theme.bg,
                            borderRadius: '24px', boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.25)',
                            display: 'flex', flexDirection: 'column', border: `1px solid ${theme.border}`,
                            marginBottom: '16px', overflow: 'hidden'
                        }}>
                            {/* Header */}
                            <div style={{ padding: '24px', borderBottom: `1px solid ${theme.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: '#fff' }}>
                                <div style={{ display: 'flex', alignItems: 'center', gap: '14px' }}>
                                    <MOHLogo />
                                    <div>
                                        <h2 style={{ margin: 0, fontSize: '20px', fontWeight: '700', color: theme.text, letterSpacing: '-0.5px' }}>LOBOT</h2>
                                        <p style={{ margin: 0, fontSize: '11px', color: theme.subtext, fontWeight: '600', textTransform: 'uppercase', letterSpacing: '0.05em' }}>MOH Legal Pilot</p>
                                    </div>
                                </div>
                                <button onClick={() => setIsOpen(false)} style={{ background: '#f8fafc', border: 'none', cursor: 'pointer', color: theme.subtext, fontSize: '18px', width: '32px', height: '32px', borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>✕</button>
                            </div>

                            {/* Chat Body */}
                            <div style={{ flex: 1, padding: '24px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '24px', background: '#ffffff' }}>
                                {messages.map((m, i) => (
                                    <div key={i} style={{ 
                                        alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start',
                                        maxWidth: '85%', fontSize: '15px', lineHeight: '1.6', color: theme.text,
                                        backgroundColor: m.role === 'user' ? theme.userBubble : 'transparent',
                                        padding: m.role === 'user' ? '14px 18px' : '0',
                                        borderRadius: '18px 18px 4px 18px', whiteSpace: 'pre-wrap',
                                        border: m.role === 'user' ? `1px solid ${theme.border}` : 'none'
                                    }}>
                                        {m.text}
                                    </div>
                                ))}
                                <div ref={chatEndRef} />
                            </div>

                            {/* Input Footer */}
                            <div style={{ padding: '20px 24px 32px', background: '#fff' }}>
                                <div style={{ 
                                    display: 'flex', alignItems: 'center', backgroundColor: '#f8fafc', 
                                    borderRadius: '16px', border: `1px solid ${theme.border}`, padding: '6px 8px' 
                                }}>
                                    <input 
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                        placeholder="Ask LOBOT anything..."
                                        style={{ flex: 1, border: 'none', background: 'transparent', padding: '12px', outline: 'none', fontSize: '15px', color: theme.text }}
                                    />
                                    <button onClick={handleSend} style={{ 
                                        backgroundColor: theme.primary, color: 'white', border: 'none', 
                                        borderRadius: '12px', width: '40px', height: '40px', cursor: 'pointer', 
                                        display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '18px'
                                    }}>↑</button>
                                </div>
                                <div style={{ textAlign: 'center', fontSize: '10px', color: '#94a3b8', marginTop: '16px', fontWeight: '500' }}>
                                    INTERNAL PILOT ONLY • ENCRYPTED SESSION
                                </div>
                            </div>
                        </div>
                    )}

                    {!isOpen && (
                        <button 
                            onClick={() => setIsOpen(true)}
                            style={{
                                backgroundColor: theme.primary, color: 'white', border: 'none',
                                padding: '16px
