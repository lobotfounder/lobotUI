<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOH Legal Assistant Pilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f5f7f9; margin: 0; font-family: 'Inter', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function ClaudeStyleAssistant() {
            const [isOpen, setIsOpen] = useState(false);
            const [input, setInput] = useState("");
            const [messages, setMessages] = useState([
                { role: 'bot', text: "Hello Mako. I've indexed the latest circulars. How can I assist with your agency-specific research or drafting today?" }
            ]);
            const chatEndRef = useRef(null);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
            }, [messages]);

            const handleSend = () => {
                if (!input.trim()) return;
                const newMessages = [...messages, { role: 'user', text: input }];
                setMessages(newMessages);
                setInput("");
                
                // Simulated API Response
                setTimeout(() => {
                    setMessages([...newMessages, { 
                        role: 'bot', 
                        text: "Based on the internal guidelines [Source: Section 4.2], the procedure remains unchanged. Would you like me to draft a summary for the client?" 
                    }]);
                }, 800);
            };

            const theme = {
                primary: '#003168',
                bg: '#ffffff',
                userBubble: '#f3f4f6',
                border: '#e5e7eb',
                text: '#111827',
                subtext: '#6b7280'
            };

            return (
                <div style={{ position: 'fixed', bottom: '30px', right: '30px', zIndex: 10000 }}>
                    {isOpen && (
                        <div style={{
                            width: '400px', height: '600px', backgroundColor: theme.bg,
                            borderRadius: '20px', boxShadow: '0 25px 50px -12px rgba(0, 0, 0, 0.15)',
                            display: 'flex', flexDirection: 'column', border: `1px solid ${theme.border}`,
                            marginBottom: '16px', overflow: 'hidden'
                        }}>
                            {/* Header */}
                            <div style={{ padding: '20px 24px', borderBottom: `1px solid ${theme.border}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <div>
                                    <h2 style={{ margin: 0, fontSize: '16px', fontWeight: '600', color: theme.text }}>Legal Assistant</h2>
                                    <p style={{ margin: 0, fontSize: '12px', color: theme.subtext }}>Agency-Specific Pilot</p>
                                </div>
                                <button onClick={() => setIsOpen(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: theme.subtext, fontSize: '20px' }}>✕</button>
                            </div>

                            {/* Chat Body */}
                            <div style={{ flex: 1, padding: '24px', overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: '24px' }}>
                                {messages.map((m, i) => (
                                    <div key={i} style={{ 
                                        alignSelf: m.role === 'user' ? 'flex-end' : 'flex-start',
                                        maxWidth: '85%', fontSize: '15px', lineHeight: '1.6', color: theme.text,
                                        backgroundColor: m.role === 'user' ? theme.userBubble : 'transparent',
                                        padding: m.role === 'user' ? '12px 16px' : '0',
                                        borderRadius: '16px 16px 4px 16px', whiteSpace: 'pre-wrap'
                                    }}>
                                        {m.text}
                                    </div>
                                ))}
                                <div ref={chatEndRef} />
                            </div>

                            {/* Input Footer */}
                            <div style={{ padding: '20px 24px 32px' }}>
                                <div style={{ 
                                    display: 'flex', alignItems: 'center', backgroundColor: '#f9fafb', 
                                    borderRadius: '12px', border: `1px solid ${theme.border}`, padding: '8px 12px' 
                                }}>
                                    <input 
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                        placeholder="Ask a question..."
                                        style={{ flex: 1, border: 'none', background: 'transparent', padding: '10px', outline: 'none', fontSize: '15px' }}
                                    />
                                    <button onClick={handleSend} style={{ 
                                        backgroundColor: theme.primary, color: 'white', border: 'none', 
                                        borderRadius: '8px', padding: '8px 12px', cursor: 'pointer', fontWeight: 'bold' 
                                    }}>↑</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {!isOpen && (
                        <button 
                            onClick={() => setIsOpen(true)}
                            style={{
                                backgroundColor: theme.primary, color: 'white', border: 'none',
                                padding: '16px 28px', borderRadius: '50px', fontWeight: '600',
                                boxShadow: '0 10px 15px -3px rgba(0, 49, 104, 0.4)', cursor: 'pointer'
                            }}
                        >
                            ✨ Launch Assistant
                        </button>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ClaudeStyleAssistant />);
    </script>
</body>
</html>
